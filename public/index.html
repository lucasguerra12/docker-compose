<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Usuários</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="container">
        <h1>Gestão de Usuários</h1>

        <div class="card form-container">
            <div class="input-group">
                <input type="text" id="name" placeholder="Nome completo">
                <input type="number" id="age" placeholder="Idade">
            </div>
            <div class="button-group">
                <button id="saveBtn" class="btn-primary" onclick="saveUser()">Adicionar Usuário</button>
                <button id="cancelBtn" class="btn-secondary" onclick="cancelEdit()" style="display: none;">Cancelar</button>
            </div>
        </div>

        <h2>Lista de Usuários</h2>
        <div class="card">
            <ul id="users"></ul>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
